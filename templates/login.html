<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f7fc;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            padding:40px;
            width:380px;
            border-radius:12px;
            box-shadow:0 4px 20px rgba(0,0,0,0.1);
            text-align:center;
        }

        .login-box h1{
            margin-bottom:25px;
            color:#0f172a;
        }

        input{
            width:100%;
            padding:12px;
            margin:12px 0;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            background:#2563eb;
            color:white;
            font-size:16px;
            border-radius:6px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#1d4ed8;
        }

        .error{
            color:red;
            margin-top:10px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h1>Admin Login</h1>

    <form method="POST" action="/login">
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <button type="submit">Login</button>
    </form>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
</div>

</body>
</html>
